name: CI

on:
  push:
    branches: [ master, "feature/**", "fix/**" ]
  pull_request:
    branches: [ master ]

jobs:
  unit-tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore SnippingTool.slnx

      - name: Build
        run: dotnet build SnippingTool.Tests/SnippingTool.Tests.csproj --no-restore --configuration Release

      - name: Format check
        run: dotnet format SnippingTool/SnippingTool.csproj --verify-no-changes --no-restore

      - name: Test with coverage
        # Hosted CI stays on the unit-test lane only.
        # DesktopAutomation and InstallerSmoke run outside this workflow.
        run: >
          dotnet test SnippingTool.Tests/SnippingTool.Tests.csproj
          --configuration Release
          --no-build
          --no-restore
          --verbosity normal
          --filter "Category!=Integration"
          --collect:"XPlat Code Coverage"
          --results-directory coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/**/coverage.cobertura.xml
