name: Dependabot auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      # Auto-merge patch-level NuGet and GitHub Actions bumps only.
      # Minor and major version bumps are left for manual review.
      - name: Enable auto-merge for patch updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' &&
          (steps.meta.outputs.package-ecosystem == 'nuget' ||
           steps.meta.outputs.package-ecosystem == 'github-actions')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
