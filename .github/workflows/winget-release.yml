name: Winget Release

# Submits a new package version to microsoft/winget-pkgs for every
# successful CD run on master. Manual dispatch can still override the
# computed version and release tag when needed.

on:
  workflow_run:
    workflows: ["CD"]
    types: [completed]
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: Package version to submit. Leave blank to use the current Nerdbank.GitVersioning version.
        required: false
        type: string
      release_tag:
        description: Release tag to submit. Leave blank to use v<version>.
        required: false
        type: string

jobs:
  submit:
    runs-on: windows-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore tools
        run: dotnet tool restore

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $display = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($display)) {
            $json = dotnet nbgv get-version --format json | ConvertFrom-Json
            $display = $json.NuGetPackageVersion
          }

          $tag = "${{ inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "v$display"
          }

          "display=$display" | Out-File -Append $env:GITHUB_OUTPUT
          "tag=$tag" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Sync winget fork
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: gh repo sync dimitar-radenkov/winget-pkgs -b master

      - name: Verify winget fork head
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $fork = gh api repos/dimitar-radenkov/winget-pkgs/commits/master --jq .sha
          $upstream = gh api repos/microsoft/winget-pkgs/commits/master --jq .sha

          if ($fork -ne $upstream) {
            throw "winget-pkgs fork is not synced with upstream."
          }

      - name: Submit to winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          # Winget migration target for the Pointframe brand.
          # Historical SnippingTool manifests remain intact. Starting with the
          # next release, new submissions should publish under the Pointframe package identifier.
          identifier: DimitarRadenkov.Pointframe
          version: ${{ steps.version.outputs.display }}
          release-tag: ${{ steps.version.outputs.tag }}
          installers-regex: 'x64-Setup\.exe$'
          fork-user: dimitar-radenkov
          token: ${{ secrets.WINGET_TOKEN }}
